<ion-content>

  <ion-header color="secondary">
    <ion-toolbar color="secondary">
      <ion-buttons slot="start">
        <ion-menu-button></ion-menu-button>
      </ion-buttons>
      <ion-title>
        <span>Indicadores GrupoSC</span>
      </ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="pincipal">

    <ion-card>
      <ion-card-header>
        <ion-card-subtitle style="text-align:center; color: aliceblue; font-size: 16px">Analise da UPM.</ion-card-subtitle>
      </ion-card-header>
      <ion-list *ngFor="let upm of upms">
        <ion-item>
          <!-- <ion-icon name="nome" slot="start"></ion-icon> -->
          <ion-card-content class="pr">{{upm.indicador}}</ion-card-content>
        </ion-item>
        <ion-item>
          <ion-label>Meta Mensal</ion-label>
          <ion-card-content>{{upm.meta}}</ion-card-content>
        </ion-item>
        <ion-item>
          <ion-label>Real até o período</ion-label>
          <ion-card-content>{{upm.upm}}</ion-card-content>
        </ion-item>
        <ion-item>
          <ion-label>Erros</ion-label>
          <ion-card-content>{{upm.erros}}</ion-card-content>
        </ion-item>

      </ion-list>


    </ion-card>
  </div>

</ion-content>
