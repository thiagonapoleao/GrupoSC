<ion-content [scrollEvents]="true" (ionScrollStart)="logScrollStart()" (ionScroll)="logScrolling($event)"
  (ionScrollEnd)="logScrollEnd()">

  <ion-header >
      <ion-toolbar color="secondary">
          <ion-buttons slot="start">
            <ion-menu-button></ion-menu-button>
          </ion-buttons>
          <ion-title>
              <span>Indicadores GrupoSC</span>
          </ion-title>
        </ion-toolbar>
      </ion-header>

      <ion-card>
        <ion-card-header>
          <ion-card-subtitle>Indicadores GrupoSC</ion-card-subtitle>
          <ion-card-title>{{codigo}}</ion-card-title>
        </ion-card-header>
        <ion-item>
          <ion-icon name="nome" slot="start"></ion-icon>
          <ion-card-content>{{nome}}</ion-card-content>
        </ion-item>
        <ion-item>
          <ion-icon name="total" slot="start"></ion-icon>
          <ion-card-content>{{total'}}</ion-card-content>
        </ion-item>
        <ion-item>
          <ion-icon name="media" slot="start"></ion-icon>
          <ion-card-content>{{media}}</ion-card-content>
        </ion-item>
        <ion-item>
          <ion-icon name="porcen" slot="start"></ion-icon>
          <ion-card-content>{{porcen}}</ion-card-content>
        </ion-item>
      </ion-card>

 
</ion-content>
