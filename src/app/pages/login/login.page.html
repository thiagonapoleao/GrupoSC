<ion-content>
  <div class="pincipal">

    <ion-segment (ionChange)="segmentChanged($event)" mode="ios" value="login">
          <ion-segment-button value="login">
            <ion-label class="segment">Login</ion-label>
          </ion-segment-button>
          <ion-segment-button value="register">
            <ion-label class="segment"> Cadastro</ion-label>
          </ion-segment-button>
        </ion-segment>

    <ion-slides>
      <ion-slide>
        <div class="slide-inner ion-padding">
          <span>Login</span>

          <ion-item class="ion-margin-top" lines="none">
            <ion-input type="email" placeholder="E-mail"></ion-input>
          </ion-item>

          <ion-item class="ion-margin-top" lines="none">
            <ion-input type="password" placeholder="Senha"></ion-input>
          </ion-item>

          <ion-button class="ion-margin-top" (click)="Login()" color="light" expand="block">Entrar</ion-button>
        </div>
      </ion-slide>

      <ion-slide>
        <div class="slide-inner ion-padding">
          <span>Cadastro</span>

          <ion-item class="ion-margin-top" lines="none">
            <ion-input type="text" placeholder="Nome"></ion-input>
          </ion-item>

          <ion-item class="ion-margin-top" lines="none">
            <ion-input type="email" placeholder="E-mail"></ion-input>
          </ion-item>

          <ion-item class="ion-margin-top" lines="none">
            <ion-input type="password" placeholder="Senha"></ion-input>
          </ion-item>

          <ion-button class="ion-margin-top" (click)="register()" color="light" expand="block">Cadastrar</ion-button>
        </div>
      </ion-slide>
    </ion-slides>
  </div>
</ion-content>
