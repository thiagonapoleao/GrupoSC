<ion-content>
  <div class="pincipal">

    
    <ion-slides>
      <ion-slide>
        <div class="slide-inner ion-padding">
          <span>Login</span>

          <ion-item class="ion-margin-top" lines="none">
            <ion-input type="text" placeholder="usuario" [(ngModel)]=usuario></ion-input>
          </ion-item>

          <ion-item class="ion-margin-top" lines="none">
            <ion-input type="password" placeholder="Senha" [(ngModel)]=senha></ion-input>
          </ion-item>

          <ion-button class="ion-margin-top" (click)="Login()" color="light" expand="block">Entrar</ion-button>
        </div>
      </ion-slide>

     
    </ion-slides>
  </div>
</ion-content>
